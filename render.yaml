databases:
  - name: faraj-os-db
    plan: starter
    postgresMajorVersion: 16

services:
  - type: web
    name: faraj-os
    runtime: node
    plan: starter
    buildCommand: npm run build
    startCommand: npm run start
    preDeployCommand: npx prisma migrate deploy --schema=database/prisma/schema.prisma
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: faraj-os-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
