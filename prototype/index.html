<title>Faraj OS — Business Operating System</title>
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#F5F7F6; --surface:#FFFFFF; --surface-2:#FBFCFB; --raise:#FFFFFF;
  --border:#E6EAE8; --border-strong:#D6DCD9;
  --text:#131C1A; --text-2:#3F4C48; --muted:#69766F; --faint:#95A19B;
  --brand:#0E7C6B; --brand-2:#0A5D50; --brand-soft:#E2F1ED; --brand-tint:#F1F8F6;
  --good:#16A34A; --good-soft:#E6F5EC;
  --warn:#C77300; --warn-soft:#FBF0DE;
  --crit:#DC2626; --crit-soft:#FBE7E7;
  --cdf:#7C5CE0; --cdf-soft:#EEE9FB;
  --usd:#0E7C6B; --usd-soft:#E2F1ED;
  --shadow:0 1px 2px rgba(19,28,26,.04), 0 4px 16px -6px rgba(19,28,26,.10);
  --shadow-lg:0 8px 40px -12px rgba(19,28,26,.22);
  --r:14px; --r-sm:10px; --r-lg:20px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",Menlo,monospace;
  --sidebar:248px;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0A0F0D; --surface:#111815; --surface-2:#0E1411; --raise:#151D19;
    --border:#212B27; --border-strong:#2C3833;
    --text:#E9EEEB; --text-2:#B9C4BF; --muted:#8A968F; --faint:#63706A;
    --brand:#2DD4BF; --brand-2:#5EEAD4; --brand-soft:#123029; --brand-tint:#0E1A17;
    --good:#34D399; --good-soft:#12261C;
    --warn:#FBBF24; --warn-soft:#2A2110;
    --crit:#F87171; --crit-soft:#2A1414;
    --cdf:#A78BFA; --cdf-soft:#1C1830;
    --usd:#2DD4BF; --usd-soft:#123029;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 6px 22px -8px rgba(0,0,0,.55);
    --shadow-lg:0 12px 50px -12px rgba(0,0,0,.7);
  }
}
:root[data-theme="light"]{
  --bg:#F5F7F6; --surface:#FFFFFF; --surface-2:#FBFCFB; --raise:#FFFFFF;
  --border:#E6EAE8; --border-strong:#D6DCD9;
  --text:#131C1A; --text-2:#3F4C48; --muted:#69766F; --faint:#95A19B;
  --brand:#0E7C6B; --brand-2:#0A5D50; --brand-soft:#E2F1ED; --brand-tint:#F1F8F6;
  --good:#16A34A; --good-soft:#E6F5EC; --warn:#C77300; --warn-soft:#FBF0DE;
  --crit:#DC2626; --crit-soft:#FBE7E7; --cdf:#7C5CE0; --cdf-soft:#EEE9FB;
  --usd:#0E7C6B; --usd-soft:#E2F1ED;
  --shadow:0 1px 2px rgba(19,28,26,.04), 0 4px 16px -6px rgba(19,28,26,.10);
  --shadow-lg:0 8px 40px -12px rgba(19,28,26,.22);
}
:root[data-theme="dark"]{
  --bg:#0A0F0D; --surface:#111815; --surface-2:#0E1411; --raise:#151D19;
  --border:#212B27; --border-strong:#2C3833;
  --text:#E9EEEB; --text-2:#B9C4BF; --muted:#8A968F; --faint:#63706A;
  --brand:#2DD4BF; --brand-2:#5EEAD4; --brand-soft:#123029; --brand-tint:#0E1A17;
  --good:#34D399; --good-soft:#12261C; --warn:#FBBF24; --warn-soft:#2A2110;
  --crit:#F87171; --crit-soft:#2A1414; --cdf:#A78BFA; --cdf-soft:#1C1830;
  --usd:#2DD4BF; --usd-soft:#123029;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 6px 22px -8px rgba(0,0,0,.55);
  --shadow-lg:0 12px 50px -12px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  font-feature-settings:"cv02","cv03","cv04";}
h1,h2,h3,h4{margin:0;font-weight:650;letter-spacing:-.02em;text-wrap:balance}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
::selection{background:var(--brand-soft);color:var(--brand-2)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============ APP SHELL ============ */
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px;gap:6px}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand-mark{width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(140deg,var(--brand),var(--brand-2));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:16px;
  box-shadow:0 2px 10px -2px var(--brand)}
.brand-name{font-weight:700;letter-spacing:-.02em;font-size:15px;line-height:1.1}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:.02em}
.nav-label{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--faint);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:8.5px 10px;border-radius:10px;
  color:var(--text-2);font-weight:530;font-size:13.5px;position:relative;transition:.14s;width:100%;text-align:left}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--brand-tint);color:var(--brand-2);font-weight:620}
.nav-item.active .ico{color:var(--brand)}
.nav-item .ico{width:18px;height:18px;flex:none;color:var(--muted);transition:.14s}
.nav-item.active::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;
  border-radius:0 3px 3px 0;background:var(--brand)}
.nav-badge{margin-left:auto;font-size:11px;font-weight:700;background:var(--crit);color:#fff;
  min-width:18px;height:18px;padding:0 5px;border-radius:9px;display:grid;place-items:center}
.sidebar-foot{margin-top:auto;border-top:1px solid var(--border);padding-top:12px}
.admin{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:10px}
.admin:hover{background:var(--surface-2)}
.avatar{width:32px;height:32px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-weight:700;font-size:12.5px;color:#fff;background:linear-gradient(140deg,#0E7C6B,#7C5CE0)}
.admin-name{font-weight:600;font-size:13px}
.admin-role{font-size:11px;color:var(--muted)}

/* ============ MAIN ============ */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:12px 26px;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(150%) blur(12px);border-bottom:1px solid var(--border)}
.search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:8px 12px;width:300px;color:var(--muted);font-size:13px}
.search input{border:none;background:none;outline:none;color:var(--text);width:100%;font-size:13px;font-family:inherit}
.kbd{margin-left:auto;font-size:10.5px;border:1px solid var(--border);border-radius:5px;padding:1px 5px;color:var(--faint)}
.fx-pill{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:6px 12px;font-size:12.5px}
.fx-pill b{font-weight:650}
.fx-dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px var(--good-soft)}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--border);
  display:grid;place-items:center;color:var(--text-2);position:relative;transition:.14s}
.icon-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-strong)}
.icon-btn .dot{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;
  background:var(--crit);border:2px solid var(--surface)}
.content{padding:24px 26px 60px;max-width:1360px;width:100%;margin:0 auto}
.page{display:none;animation:fade .3s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ============ HEADER ============ */
.page-head{display:flex;align-items:flex-start;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.page-title{font-size:24px;font-weight:680}
.page-sub{color:var(--muted);font-size:13.5px;margin-top:3px}
.head-actions{margin-left:auto;display:flex;gap:9px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:10px;
  font-weight:600;font-size:13px;border:1px solid var(--border);background:var(--surface);
  color:var(--text);transition:.14s;white-space:nowrap}
.btn:hover{border-color:var(--border-strong);background:var(--surface-2)}
.btn .ico{width:16px;height:16px}
.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff;
  box-shadow:0 2px 10px -3px var(--brand)}
.btn-primary:hover{background:var(--brand-2);border-color:var(--brand-2)}
:root[data-theme="dark"] .btn-primary,@media (prefers-color-scheme:dark){.btn-primary{color:#04211C}}

/* ============ CARDS ============ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(4,1fr);margin-bottom:16px}
.kpi{padding:16px 17px;position:relative;overflow:hidden}
.kpi-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.kpi-ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none}
.kpi-label{font-size:12.5px;color:var(--muted);font-weight:560}
.kpi-cur{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 6px;border-radius:5px}
.chip-cdf{background:var(--cdf-soft);color:var(--cdf)}
.chip-usd{background:var(--usd-soft);color:var(--usd)}
.kpi-val{font-size:23px;font-weight:700;letter-spacing:-.03em;line-height:1.1}
.kpi-val .unit{font-size:13px;font-weight:600;color:var(--muted);margin-left:3px}
.kpi-second{display:flex;align-items:baseline;gap:6px;margin-top:5px;font-size:13px;color:var(--text-2)}
.kpi-second .sm{font-size:11px;color:var(--muted)}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:650;margin-top:10px}
.up{color:var(--good)} .down{color:var(--crit)}
.kpi-spark{position:absolute;right:0;bottom:0;opacity:.85;width:120px;height:44px}

/* ============ REPORT STRIP ============ */
.strip{display:flex;align-items:center;gap:18px;padding:15px 18px;margin-bottom:16px;flex-wrap:wrap}
.strip-lead{display:flex;align-items:center;gap:13px}
.ring{--p:67;width:46px;height:46px;border-radius:50%;flex:none;
  background:conic-gradient(var(--brand) calc(var(--p)*1%),var(--border) 0);
  display:grid;place-items:center;position:relative}
.ring::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--surface)}
.ring span{position:relative;font-size:12px;font-weight:700}
.branch-pips{display:flex;gap:7px;margin-left:auto;flex-wrap:wrap}
.pip{display:flex;align-items:center;gap:7px;padding:6px 11px 6px 8px;border-radius:9px;
  border:1px solid var(--border);font-size:12.5px;font-weight:560;background:var(--surface-2)}
.pip i{width:8px;height:8px;border-radius:50%;flex:none;font-style:normal}
.pip.done i{background:var(--good)} .pip.pend i{background:var(--warn)} .pip.miss i{background:var(--faint)}
.pip.pend{border-color:color-mix(in srgb,var(--warn) 35%,var(--border))}

/* ============ DASH GRID ============ */
.dash{grid-template-columns:2fr 1fr;align-items:start}
.section-title{display:flex;align-items:center;gap:9px;margin-bottom:2px;font-size:15px;font-weight:640}
.card-head{display:flex;align-items:center;gap:10px;padding:16px 18px 6px}
.card-head h3{font-size:14.5px;font-weight:630}
.card-head .sub{font-size:12px;color:var(--muted)}
.seg{margin-left:auto;display:flex;gap:2px;background:var(--surface-2);border:1px solid var(--border);
  padding:3px;border-radius:9px}
.seg button{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:6px;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.chart-wrap{padding:8px 12px 14px}
.legend{display:flex;gap:16px;padding:0 18px 14px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2)}
.legend i{width:10px;height:10px;border-radius:3px;font-style:normal}

/* BI insights */
.insight{display:flex;gap:12px;padding:13px 18px;border-top:1px solid var(--border);align-items:flex-start}
.insight:first-of-type{border-top:none}
.insight-ico{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center}
.insight h4{font-size:13px;font-weight:620;display:flex;align-items:center;gap:8px}
.insight p{margin:2px 0 0;font-size:12.5px;color:var(--muted)}
.tag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.02em}
.tag.good{background:var(--good-soft);color:var(--good)}
.tag.warn{background:var(--warn-soft);color:var(--warn)}
.tag.crit{background:var(--crit-soft);color:var(--crit)}
.tag.brand{background:var(--brand-soft);color:var(--brand-2)}

/* leaderboard */
.lb-row{display:grid;grid-template-columns:24px 1fr auto;gap:12px;align-items:center;
  padding:11px 18px;border-top:1px solid var(--border)}
.lb-rank{font-weight:700;font-size:13px;color:var(--muted);text-align:center}
.lb-rank.top{color:var(--brand)}
.lb-name{font-weight:600;font-size:13px}
.lb-meta{font-size:11.5px;color:var(--muted);margin-top:1px}
.lb-bar{width:90px;height:6px;border-radius:4px;background:var(--surface-2);overflow:hidden;margin-top:6px}
.lb-bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--brand),var(--brand-2))}
.lb-score{font-weight:700;font-size:14px;text-align:right}
.lb-score .sc{font-size:11px;color:var(--muted);font-weight:500}

/* activity */
.feed{padding:6px 4px 8px}
.feed-item{display:flex;gap:12px;padding:9px 14px;position:relative}
.feed-dot{width:9px;height:9px;border-radius:50%;flex:none;margin-top:5px;background:var(--brand);
  box-shadow:0 0 0 3px var(--brand-tint)}
.feed-item.exp .feed-dot{background:var(--warn);box-shadow:0 0 0 3px var(--warn-soft)}
.feed-item.stock .feed-dot{background:var(--cdf);box-shadow:0 0 0 3px var(--cdf-soft)}
.feed-txt{font-size:12.8px;color:var(--text-2)}
.feed-txt b{color:var(--text);font-weight:620}
.feed-time{font-size:11px;color:var(--faint);margin-top:1px}

/* AI card */
.ai-card{background:linear-gradient(155deg,var(--brand-tint),var(--surface));
  border:1px solid color-mix(in srgb,var(--brand) 22%,var(--border));overflow:hidden;position:relative}
.ai-card::before{content:"";position:absolute;top:-40px;right:-40px;width:150px;height:150px;
  border-radius:50%;background:radial-gradient(circle,var(--brand-soft),transparent 70%);opacity:.7}
.ai-head{display:flex;align-items:center;gap:10px;padding:15px 18px 4px;position:relative}
.ai-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
  color:var(--brand-2);background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
.ai-body{padding:6px 18px 16px;font-size:13px;line-height:1.65;color:var(--text-2);position:relative}
.ai-body b{color:var(--text)}
.ai-body .hl{background:var(--brand-soft);color:var(--brand-2);padding:0 4px;border-radius:4px;font-weight:600}

/* ============ TABLE ============ */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted);padding:11px 16px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface-2)}
tbody td{padding:13px 16px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
.t-name{font-weight:600}
.t-sub{font-size:11.5px;color:var(--muted)}
.status{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:650;padding:4px 10px;border-radius:20px}
.status i{width:6px;height:6px;border-radius:50%;font-style:normal}
.status.approved{background:var(--good-soft);color:var(--good)} .status.approved i{background:var(--good)}
.status.pending{background:var(--warn-soft);color:var(--warn)} .status.pending i{background:var(--warn)}
.status.locked{background:var(--brand-soft);color:var(--brand-2)} .status.locked i{background:var(--brand)}
.status.missing{background:var(--surface-2);color:var(--muted)} .status.missing i{background:var(--faint)}
.mini-btn{font-size:12px;font-weight:600;color:var(--brand-2);padding:5px 10px;border-radius:7px;border:1px solid var(--border)}
.mini-btn:hover{background:var(--brand-tint)}

/* branches */
.branch-grid{grid-template-columns:repeat(3,1fr)}
.branch-card{padding:17px 18px;position:relative;overflow:hidden}
.bc-top{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.bc-logo{width:40px;height:40px;border-radius:11px;flex:none;display:grid;place-items:center;
  font-weight:750;color:#fff;font-size:14px}
.bc-name{font-weight:670;font-size:15px}
.bc-mgr{font-size:11.5px;color:var(--muted)}
.bc-rank{margin-left:auto;font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;
  background:var(--brand-tint);color:var(--brand-2)}
.bc-stats{display:grid;grid-template-columns:1fr 1fr;gap:2px 16px;padding:12px 0;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:12px}
.bc-stat .l{font-size:11px;color:var(--muted)}
.bc-stat .v{font-size:14.5px;font-weight:680;letter-spacing:-.02em;margin-top:1px}
.bc-foot{display:flex;align-items:center;justify-content:space-between;gap:10px}
.health{display:flex;align-items:center;gap:9px}
.health-ring{--p:88;width:38px;height:38px;border-radius:50%;
  background:conic-gradient(var(--hc) calc(var(--p)*1%),var(--border) 0);display:grid;place-items:center;position:relative}
.health-ring::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--surface)}
.health-ring b{position:relative;font-size:11px;font-weight:700}
.health-lab{font-size:11px;color:var(--muted);line-height:1.3}
.health-lab b{display:block;font-size:12.5px;color:var(--text)}

/* generic list rows */
.prod-cat{display:inline-flex;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;
  background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
.dot-unit{color:var(--muted);font-size:12px}
.bar-inline{display:flex;align-items:center;gap:9px}
.bar-inline .track{width:70px;height:6px;border-radius:4px;background:var(--surface-2);overflow:hidden}
.bar-inline .track i{display:block;height:100%;border-radius:4px}
.bar-inline b{font-size:12.5px;font-weight:640;min-width:34px}

/* stat tiles small */
.mini-stats{grid-template-columns:repeat(4,1fr);margin-bottom:16px}
.mini{padding:14px 16px}
.mini .l{font-size:12px;color:var(--muted);font-weight:550;display:flex;align-items:center;gap:7px}
.mini .v{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-top:8px}
.mini .d{font-size:11.5px;margin-top:3px;font-weight:600}

/* settings */
.set-grid{grid-template-columns:220px 1fr;gap:0;overflow:hidden}
.set-nav{border-right:1px solid var(--border);padding:12px;background:var(--surface-2)}
.set-nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:9px 11px;
  border-radius:9px;font-size:13px;font-weight:560;color:var(--text-2)}
.set-nav button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow);font-weight:620}
.set-body{padding:22px 24px}
.set-row{display:flex;align-items:center;gap:16px;padding:15px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border:none}
.set-row .info{flex:1}
.set-row .info h4{font-size:13.5px;font-weight:620}
.set-row .info p{font-size:12.5px;color:var(--muted);margin:2px 0 0}
.field{background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;
  font-size:13px;color:var(--text);font-family:inherit;outline:none;min-width:180px}
.field:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
.toggle{width:42px;height:24px;border-radius:20px;background:var(--border-strong);position:relative;transition:.18s;flex:none}
.toggle.on{background:var(--brand)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
  background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{left:20px}

/* ============ WIZARD MODAL ============ */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(10,15,13,.55);backdrop-filter:blur(4px);
  display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.overlay.open{display:flex;animation:fade .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  width:100%;max-width:660px;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .25s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:16px}
.modal-head .close{margin-left:auto;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
  color:var(--muted)}
.modal-head .close:hover{background:var(--surface-2);color:var(--text)}
.steps{display:flex;gap:0;padding:16px 22px;border-bottom:1px solid var(--border)}
.step{display:flex;align-items:center;gap:9px;flex:1;position:relative;font-size:12px;color:var(--muted)}
.step:not(:last-child)::after{content:"";position:absolute;left:38px;right:8px;top:14px;height:2px;background:var(--border)}
.step.done:not(:last-child)::after{background:var(--brand)}
.step-num{width:28px;height:28px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-weight:700;font-size:12px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);z-index:1}
.step.on .step-num{background:var(--brand);border-color:var(--brand);color:#fff}
.step.done .step-num{background:var(--brand-soft);border-color:var(--brand);color:var(--brand-2)}
.step.on{color:var(--text);font-weight:640} .step.done{color:var(--text-2)}
.modal-body{padding:22px;min-height:230px}
.wstep{display:none} .wstep.active{display:block;animation:fade .2s}
.field-label{font-size:12.5px;font-weight:600;color:var(--text-2);margin-bottom:7px;display:block}
.field-row{display:flex;gap:12px;margin-bottom:16px}
.field-row .fg{flex:1}
.field-full{width:100%}
select.field,input.field,textarea.field{width:100%}
.choice-row{display:flex;gap:10px;margin-bottom:8px}
.choice{flex:1;padding:16px;border:1.5px solid var(--border);border-radius:12px;text-align:center;
  font-weight:600;transition:.14s}
.choice:hover{border-color:var(--brand)}
.choice.sel{border-color:var(--brand);background:var(--brand-tint);color:var(--brand-2)}
.choice .big{font-size:15px}.choice .sm{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:3px}
.choice.sel .sm{color:var(--brand-2)}
.cur-input{display:flex;align-items:stretch;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.cur-input .pre{padding:9px 12px;background:var(--surface-2);font-weight:700;font-size:12px;
  display:flex;align-items:center;border-right:1px solid var(--border);color:var(--muted)}
.cur-input input{border:none;background:none;padding:9px 12px;font-size:15px;font-weight:600;
  outline:none;color:var(--text);width:100%;font-variant-numeric:tabular-nums}
.exp-line{display:grid;grid-template-columns:1fr 130px 80px 34px;gap:8px;margin-bottom:8px;align-items:center}
.add-line{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--brand-2);
  padding:7px 0;margin-top:2px}
.rm-line{color:var(--muted);width:30px;height:30px;border-radius:8px;display:grid;place-items:center}
.rm-line:hover{background:var(--crit-soft);color:var(--crit)}
.review-block{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:4px 16px;margin-bottom:14px}
.review-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;
  border-bottom:1px solid var(--border);font-size:13px}
.review-line:last-child{border:none}
.review-line .rl{color:var(--muted)} .review-line .rv{font-weight:640}
.review-total{display:flex;justify-content:space-between;padding:14px 16px;margin-bottom:14px;
  background:var(--brand-tint);border-radius:12px;font-weight:700;font-size:15px}
.modal-foot{display:flex;align-items:center;gap:10px;padding:16px 22px;border-top:1px solid var(--border);background:var(--surface-2)}
.modal-foot .spacer{flex:1}

/* toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:13px 16px;box-shadow:var(--shadow-lg);min-width:280px;
  animation:slidein .3s cubic-bezier(.2,.9,.3,1.2)}
@keyframes slidein{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
.toast .tico{width:32px;height:32px;border-radius:9px;flex:none;display:grid;place-items:center;
  background:var(--good-soft);color:var(--good)}
.toast b{font-size:13px;font-weight:640}.toast p{font-size:12px;color:var(--muted);margin:1px 0 0}

/* skeleton hint */
.divider{height:1px;background:var(--border);margin:20px 0}
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.empty .ico{width:44px;height:44px;margin:0 auto 12px;opacity:.5}

.notice{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;
  background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 30%,transparent);
  color:var(--text-2);font-size:13px;margin-bottom:16px}
.notice .ico{color:var(--warn);flex:none}

@media (max-width:1080px){
  .app{grid-template-columns:1fr} .sidebar{display:none}
  .kpis,.mini-stats{grid-template-columns:repeat(2,1fr)}
  .dash{grid-template-columns:1fr} .branch-grid{grid-template-columns:1fr}
  .search{display:none}
}

/* ============ CHART HELPERS ============ */
function spark(data,w=120,h=44,color='var(--brand)',fill=true){
  const mn=Math.min(...data),mx=Math.max(...data),rg=(mx-mn)||1;
  const pts=data.map((v,i)=>[i/(data.length-1)*w, h-6-((v-mn)/rg)*(h-14)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=fill?`<path d="${d} L${w} ${h} L0 ${h} Z" fill="${color}" opacity=".10"/>`:'';
  const end=pts[pts.length-1];
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${area}
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${end[0]}" cy="${end[1]}" r="2.6" fill="${color}"/></svg>`;
}
function areaChart(series,w=560,h=200){
  // series: [{data,color}] plus x labels
  const all=series.flatMap(s=>s.data); const mx=Math.max(...all)*1.12,mn=0;
  const pad={l:8,r:8,t:12,b:24}, iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const X=i=>pad.l+i/(series[0].data.length-1)*iw;
  const Y=v=>pad.t+ih-((v-mn)/(mx-mn))*ih;
  let grid=''; for(let g=0;g<=3;g++){const y=pad.t+ih*g/3;grid+=`<line x1="${pad.l}" x2="${w-pad.r}" y1="${y}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`}
  let paths=series.map((s,si)=>{
    const pts=s.data.map((v,i)=>[X(i),Y(v)]);
    const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    const gid='g'+si;
    return `<defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="${s.color}" stop-opacity=".26"/><stop offset="1" stop-color="${s.color}" stop-opacity="0"/></linearGradient></defs>
      <path d="${d} L${X(s.data.length-1)} ${pad.t+ih} L${X(0)} ${pad.t+ih} Z" fill="url(#${gid})"/>
      <path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
      ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.4" fill="var(--surface)" stroke="${s.color}" stroke-width="1.6"/>`).join('')}`;
  }).join('');
  const labs=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let xl=labs.map((l,i)=>`<text x="${X(i)}" y="${h-6}" font-size="10.5" fill="var(--faint)" text-anchor="middle">${l}</text>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${grid}${paths}${xl}</svg>`;
}
function barChart(data,w=560,h=210){
  const mx=Math.max(...data.map(d=>d.v))*1.15;
  const pad={l:8,r:8,t:10,b:34},iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  const bw=iw/data.length*0.5;
  let bars=data.map((d,i)=>{
    const x=pad.l+(i+.5)/data.length*iw-bw/2;
    const bh=(d.v/mx)*ih, y=pad.t+ih-bh;
    return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="5" fill="${d.color}" opacity=".92"/>
      <text x="${x+bw/2}" y="${y-6}" font-size="10.5" font-weight="600" fill="var(--text-2)" text-anchor="middle">${d.lab}</text>
      <text x="${x+bw/2}" y="${h-10}" font-size="10.5" fill="var(--faint)" text-anchor="middle">${d.name}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${bars}</svg>`;
}
function donut(data,size=150){
  const r=size/2-14,cx=size/2,cy=size/2,C=2*Math.PI*r;
  const tot=data.reduce((a,b)=>a+b.v,0);let off=0;
  let arcs=data.map(d=>{
    const frac=d.v/tot,len=frac*C;
    const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="16"

    off+=len;return el;
  }).join('');
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${arcs}

function miniStat(label,val,color,delta,dir){
  return `<div class="card mini"><div class="l"><span style="width:8px;height:8px;border-radius:3px;background:${color};display:inline-block"></span>${label}</div>
    <div class="v num">${val}</div><div class="d ${dir}">${delta}</div></div>`;
}
function settingIcon(i){
  const ic=['M3 21h18M5 21V7l7-4 7 4v14','M12 2a10 10 0 1 0 0 20','M17 21v-2a4 4 0 0 0-8 0v2M13 7a3 3 0 1 1-6 0 3 3 0 0 1 6 0','M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6','M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6M2 12h4','M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18','M21 12a9 9 0 1 1-6.2-8.5','M12 8v4l3 2'];
  return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${ic[i]}"/></svg>`;
}

/* ============ ROUTER ============ */
function go(page){

  window.scrollTo(0,0);
}
document.getElementById('nav').addEventListener('click',e=>{
  const btn=e.target.closest('.nav-item'); if(btn) go(btn.dataset.page);
});

/* ============ THEME ============ */
const root=document.documentElement;
function setTheme(t){root.setAttribute('data-theme',t);localStorage.setItem('faraj-theme',t);
  document.getElementById('themeIco').innerHTML = t==='dark'
    ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M5 5l1.5 1.5M17.5 17.5 19 19M2 12h2M20 12h2M5 19l1.5-1.5M17.5 6.5 19 5"/>'
    : '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
}
const saved=localStorage.getItem('faraj-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
setTheme(saved);
document.getElementById('themeBtn').onclick=()=>setTheme(root.getAttribute('data-theme')==='dark'?'light':'dark');

/* ============ TOAST ============ */
function toast(title,msg){
  const el=document.createElement('div');el.className='toast';
  el.innerHTML=`<div class="tico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg></div>
    <div><b>${title}</b><p>${msg}</p></div>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(30px)';el.style.transition='.3s';setTimeout(()=>el.remove(),300)},3200);
}

function openWizard(){wStep=0;renderWiz();document.getElementById('overlay').classList.add('open')}
function closeWizard(){document.getElementById('overlay').classList.remove('open')}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeWizard()});
function renderWiz(){
  document.getElementById('wizBody').innerHTML=wizSteps[wStep];
  document.querySelectorAll('#steps .step').forEach((s,i)=>{
    s.classList.toggle('on',i===wStep);s.classList.toggle('done',i<wStep);
    if(i<wStep)s.querySelector('.step-num').innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>';
    else s.querySelector('.step-num').textContent=i+1;
  });
  document.getElementById('wBack').style.visibility=wStep===0?'hidden':'visible';
  document.getElementById('wProg').textContent=`Step ${wStep+1} of 5`;
  document.getElementById('wNext').textContent=wStep===4?'Submit report':'Continue';
}
function wizStep(d){
  if(d>0 && wStep===4){closeWizard();toast('Report submitted','Mipeto 2 · 13 Jul locked — dashboard updated');go('reports-daily');return;}
  wStep=Math.max(0,Math.min(4,wStep+d));renderWiz();
}
function pickRecv(el,yes){document.querySelectorAll('.choice-row .choice').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');
  document.getElementById('recvFields').style.display=yes?'block':'none';}
function addExp(){const wrap=document.getElementById('expLines');const div=document.createElement('div');div.className='exp-line';
  div.innerHTML='<input class="field" placeholder="Expense description"><div class="cur-input"><span class="pre">FC</span><input class="num" placeholder="0"></div><select class="field" style="padding:8px"><option>CDF</option><option>USD</option></select><button class="rm-line" onclick="this.parentElement.remove()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>';
  wrap.appendChild(div);}
